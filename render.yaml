services:
  - type: web
    name: animestream-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /api/scraper-health
    envVars:
      - key: APP_NAME
        value: Fer6origami
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: animestream-db
          property: connectionString
      - key: OTAKUDESU_DISABLE_PROXY
        value: "true"
      - key: OTAKUDESU_SOURCE_URL
        value: https://otakudesu.best
      - key: OTAKUDESU_WARM_PAGES
        value: "2"
      - key: OTAKUDESU_WARM_GENRES
        value: action,fantasy,romance,comedy,school,adventure
    preDeployCommand: |
      php artisan migrate --force &&
      php artisan scraper:refresh-snapshots

  - type: cron
    name: animestream-scheduler
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    schedule: "*/10 * * * *"
    dockerCommand: php artisan schedule:run
    envVars:
      - key: APP_NAME
        value: Fer6origami
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: cookie
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: animestream-db
          property: connectionString
      - key: OTAKUDESU_DISABLE_PROXY
        value: "true"
      - key: OTAKUDESU_SOURCE_URL
        value: https://otakudesu.best
      - key: OTAKUDESU_WARM_PAGES
        value: "2"
      - key: OTAKUDESU_WARM_GENRES
        value: action,fantasy,romance,comedy,school,adventure

databases:
  - name: animestream-db
    plan: starter
